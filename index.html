<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Office Hours – Sabahudin Vrtagic</title>
</head>
<body>

<h2>Course Office Hours: Sabahudin Vrtagic</h2>

<table border="1" cellpadding="10" cellspacing="0">
  <tr>
    <th>Day</th>
    <th>Time</th>
    <th>Join</th>
  </tr>
  <tr>
    <td>Sunday</td>
    <td>10:00 – 11:00</td>
    <td><span id="slot-0"></span></td>
  </tr>
  <tr>
    <td>Monday</td>
    <td>10:00 – 11:00</td>
    <td><span id="slot-1"></span></td>
  </tr>
  <tr>
    <td>Tuesday</td>
    <td>10:00 – 11:00</td>
    <td><span id="slot-2"></span></td>
  </tr>
  <tr>
    <td>Wednesday</td>
    <td>10:00 – 11:00</td>
    <td><span id="slot-3"></span></td>
  </tr>
  <tr>
    <td>Thursday</td>
    <td>10:00 – 11:00</td>
    <td><span id="slot-4"></span></td>
  </tr>
</table>

<p id="status"></p>

<script>
  var LINK = "https://myportal.aum.edu.kw/mod/bigbluebuttonbn/view.php?id=1179702";
  // Sunday=0, Monday=1, Tuesday=2, Wednesday=3, Thursday=4
  var DAYS = [0, 1, 2, 3, 4];

  function update() {
    var now = new Date();
    var day = now.getDay();
    var h = now.getHours();
    var m = now.getMinutes();
    var inTime = (h === 10) || (h === 10 && m >= 0 && m < 60);
    inTime = (h === 10);

    for (var i = 0; i < DAYS.length; i++) {
      var cell = document.getElementById("slot-" + i);
      if (day === DAYS[i] && inTime) {
        cell.innerHTML = '<a href="' + LINK + '" target="_blank">Join</a>';
      } else {
        cell.innerHTML = "Not available";
      }
    }

    var statusMsg = inTime && DAYS.indexOf(day) !== -1
      ? "Office hours are live now."
      : "Office hours are not active right now.";
    document.getElementById("status").innerText = statusMsg;
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
