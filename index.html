<div style="max-width:650px;margin:auto;font-family:Arial,Helvetica,sans-serif;
            border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.15);
            padding:20px;background:#ffffff;">

  <h2 style="margin-top:0;color:#2c3e50;">📘 Course Office Hours</h2>
  <p style="margin:5px 0;"><strong>Instructor:</strong> Sabahudin Vrtagic</p>

  <!-- STATUS -->
  <div id="statusBox" style="margin:15px 0;padding:15px;border-radius:8px;
       text-align:center;font-size:1.1em;"></div>

  <!-- COUNTDOWN -->
  <div id="countdown" style="font-size:1.15em;font-weight:bold;
       text-align:center;margin-bottom:10px;"></div>

  <!-- PROGRESS BAR -->
  <div style="margin:10px 0;">
    <div style="background:#e0e0e0;border-radius:10px;height:16px;overflow:hidden;">
      <div id="progressBar"
           style="height:100%;width:0%;background:#2ecc71;
                  transition:width 0.5s;"></div>
    </div>
    <div id="progressText"
         style="text-align:center;font-size:0.9em;color:#555;margin-top:5px;">
    </div>
  </div>

  <!-- NEXT SESSION -->
  <div id="nextSession"
       style="text-align:center;margin:15px 0;
              font-size:1em;color:#2c3e50;"></div>

  <!-- LINK BUTTON -->
  <div style="text-align:center;margin-bottom:20px;">
    <a id="officeLink"
       href="https://myportal.aum.edu.kw/mod/bigbluebuttonbn/view.php?id=1179702"
       target="_blank"
       style="display:inline-block;padding:12px 25px;
              border-radius:6px;text-decoration:none;
              font-size:1.1em;">
    </a>
  </div>

  <!-- SCHEDULE TABLE -->
  <table style="width:100%;border-collapse:collapse;">
    <tr style="background:#f2f2f2;">
      <th style="padding:10px;text-align:left;">Day</th>
      <th style="padding:10px;text-align:left;">Time</th>
    </tr>
    <tr><td style="padding:8px;">Sunday</td><td>10:00 – 11:00</td></tr>
    <tr><td style="padding:8px;">Monday</td><td>10:00 – 11:00</td></tr>
    <tr><td style="padding:8px;">Tuesday</td><td>10:00 – 11:00</td></tr>
    <tr><td style="padding:8px;">Wednesday</td><td>10:00 – 11:00</td></tr>
    <tr><td style="padding:8px;">Thursday</td><td>10:00 – 11:00</td></tr>
  </table>

  <p style="margin-top:15px;font-size:0.9em;color:#666;text-align:center;">
    ⏰ The meeting link activates automatically during office hours.
  </p>
</div>

<script>
(function () {
  const link = document.getElementById("officeLink");
  const statusBox = document.getElementById("statusBox");
  const countdownEl = document.getElementById("countdown");
  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");
  const nextSessionEl = document.getElementById("nextSession");

  const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday"];

  function getNextSession(now) {
    let d = new Date(now);
    do {
      if (d.getHours() < 10 && d.getDay() <= 4) break;
      d.setDate(d.getDate() + 1);
    } while (d.getDay() > 4);

    d.setHours(10, 0, 0, 0);
    return d;
  }

  function update() {
    const now = new Date();
    const day = now.getDay();
    const hour = now.getHours();
    const minute = now.getMinutes();
    const second = now.getSeconds();

    const isOfficeDay = day >= 0 && day <= 4;
    const isOfficeTime = isOfficeDay && hour === 10;

    if (isOfficeTime) {
      const start = new Date(now);
      start.setHours(10, 0, 0, 0);
      const end = new Date(now);
      end.setHours(11, 0, 0, 0);

      const elapsed = now - start;
      const total = end - start;
      const percent = Math.min(100, (elapsed / total) * 100);

      const remaining = end - now;
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);

      statusBox.style.background = "#e8f8f0";
      statusBox.style.color = "#1e8449";
      statusBox.innerHTML = "🟢 <strong>Office Hours OPEN</strong>";

      countdownEl.innerHTML = `⏳ Time remaining: ${m}m ${s}s`;

      progressBar.style.width = percent + "%";
      progressBar.style.background = "#2ecc71";
      progressText.innerHTML = `Progress: ${Math.floor(percent)}% of the hour`;

      link.style.background = "#2ecc71";
      link.style.color = "#fff";
      link.innerHTML = "Join Office Hours";
      link.style.pointerEvents = "auto";

      nextSessionEl.innerHTML = "";
    } else {
      const next = getNextSession(now);
      const diff = next - now;

      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      statusBox.style.background = "#fdecea";
      statusBox.style.color = "#922b21";
      statusBox.innerHTML = "🔴 <strong>Office Hours CLOSED</strong>";

      countdownEl.innerHTML = `⏳ Next office hour in: ${h}h ${m}m ${s}s`;

      progressBar.style.width = "0%";
      progressBar.style.background = "#ccc";
      progressText.innerHTML = "";

      link.style.background = "#cccccc";
      link.style.color = "#666";
      link.innerHTML = "Link inactive";
      link.style.pointerEvents = "none";

      nextSessionEl.innerHTML =
        `📅 <strong>Next session:</strong> ${days[next.getDay()]} at 10:00`;
    }
  }

  update();
  setInterval(update, 1000);
})();
</script>
